<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚡ Trainingsdashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0D0F0E;color:#E8EAE6;font-family:'Inter','Helvetica Neue',sans-serif}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fadein{animation:fadein 0.4s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const STRAVA_MCP_URL = "https://mcp.strava.com/mcp";
const API_KEY_STORAGE = "fitness_dash_api_key";

const T = {
  bg:"#0D0F0E", surface:"#141716", surfaceAlt:"#1C1F1D",
  border:"#252926", accent:"#FF4D2E", accentMuted:"#FF4D2E22",
  green:"#2ECC71", yellow:"#F7C843",
  text:"#E8EAE6", textMuted:"#7A8078", textFaint:"#3D4140",
};

const fmt = {
  pace:(mpm)=>{ if(!mpm||mpm<=0)return"–"; const m=Math.floor(mpm),s=Math.round((mpm-m)*60); return`${m}:${s.toString().padStart(2,"0")}`; },
  dist:(m)=>m>=1000?`${(m/1000).toFixed(2)} km`:`${m} m`,
  dur:(s)=>{ if(!s)return"–"; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}u ${m}m`:`${m}m`; },
  date:(d)=>new Date(d).toLocaleDateString("nl-NL",{day:"numeric",month:"short"}),
  hr:(bpm)=>bpm?`${bpm} bpm`:"–",
};

function Ring({value,max,color,size=64,stroke=6}){
  const r=(size-stroke)/2, circ=2*Math.PI*r, pct=Math.min(value/max,1), dash=circ*pct;
  return React.createElement("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},
    React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:T.border,strokeWidth:stroke}),
    React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:stroke,
      strokeDasharray:`${dash} ${circ}`,strokeLinecap:"round",
      style:{transition:"stroke-dasharray 0.8s cubic-bezier(.4,0,.2,1)"}})
  );
}

function SportIcon({type,size=16}){
  const icons={Run:"🏃",Ride:"🚴",Swim:"🏊",Walk:"🚶",Hike:"🥾",WeightTraining:"🏋️",Workout:"⚡"};
  return <span style={{fontSize:size}}>{icons[type]||"🏅"}</span>;
}

function ZoneBadge({zone}){
  const colors=["#3B82F6","#22C55E","#F7C843","#F97316","#EF4444"];
  const names=["Z1","Z2","Z3","Z4","Z5"];
  const z=Math.min(Math.max((zone||1)-1,0),4);
  return <span style={{background:colors[z]+"33",color:colors[z],borderRadius:4,padding:"2px 6px",fontSize:11,fontFamily:"monospace",fontWeight:700}}>{names[z]}</span>;
}

async function callStravaMCP(toolName,toolInput,apiKey){
  const response=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"mcp-client-2025-04-04"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:4000,
      system:"You are a Strava data assistant. Call the requested MCP tool and return ONLY the raw JSON result, nothing else.",
      messages:[{role:"user",content:`Call Strava MCP tool "${toolName}" with params: ${JSON.stringify(toolInput)}. Return only raw JSON.`}],
      mcp_servers:[{type:"url",url:STRAVA_MCP_URL,name:"strava"}],
    }),
  });
  const data=await response.json();
  if(data.error) throw new Error(data.error.message||"API fout");
  const toolResults=data.content?.filter(b=>b.type==="mcp_tool_result");
  if(toolResults?.length){ try{return JSON.parse(toolResults[0].content?.[0]?.text||"{}");}catch{return{};} }
  const textBlocks=data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  try{ const m=textBlocks.match(/[\[{][\s\S]*/); if(m)return JSON.parse(m[0]); }catch{}
  return {};
}

async function getAICoaching(activities,profile,zones,apiKey){
  const actSummary=activities.slice(0,10).map(a=>({
    date:a.start_date_local?.split("T")[0],type:a.type,
    distance:a.distance?`${(a.distance/1000).toFixed(1)}km`:null,
    duration:a.moving_time?fmt.dur(a.moving_time):null,
    pace:a.average_speed?fmt.pace(1000/a.average_speed/60):null,
    hr:a.average_heartrate,elevation:a.total_elevation_gain,sufferScore:a.suffer_score,
  }));
  const response=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:`Je bent een elite hardloop- en fietscoach. Analyseer de trainingsdata en geef concreet advies in het Nederlands. Reageer ALLEEN in JSON met deze structuur: {"headline":"...","status":"fit|recovering|building|peaking|overtrained","weeklyFocus":"...","insights":[{"title":"...","body":"...","type":"warning|tip|praise|goal"}],"nextWorkout":{"type":"Easy Run|Tempo|Intervals|Long Run|Rest|Cross-training","description":"...","duration":"...","intensity":"easy|moderate|hard"}}`,
      messages:[{role:"user",content:`Profiel: ${JSON.stringify(profile)}\n\nZones: ${JSON.stringify(zones)}\n\nActiviteiten: ${JSON.stringify(actSummary)}`}],
    }),
  });
  const data=await response.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"{}";
  try{ return JSON.parse(text.replace(/```json|```/g,"").trim()); }catch{ return null; }
}

function StatCard({label,value,ring,icon}){
  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"16px 20px",display:"flex",alignItems:"center",gap:14}}>
      {ring&&<div style={{position:"relative",flexShrink:0}}>
        <Ring {...ring}/>
        <span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:T.textMuted}}>{icon}</span>
      </div>}
      <div>
        <div style={{fontSize:22,fontWeight:700,color:T.text,lineHeight:1}}>{value}</div>
        <div style={{fontSize:11,color:T.textMuted,marginTop:3}}>{label}</div>
      </div>
    </div>
  );
}

function ActivityRow({act}){
  const pace=act.average_speed?1000/act.average_speed/60:null;
  return(
    <div style={{display:"grid",gridTemplateColumns:"24px 1fr auto auto",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
      <SportIcon type={act.type}/>
      <div>
        <div style={{fontSize:13,fontWeight:600,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:200}}>{act.name}</div>
        <div style={{fontSize:11,color:T.textMuted}}>{fmt.date(act.start_date_local)}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:13,fontFamily:"monospace",color:T.text}}>{act.distance?fmt.dist(act.distance):fmt.dur(act.moving_time)}</div>
        <div style={{fontSize:11,color:T.textMuted}}>{fmt.dur(act.moving_time)}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:12,fontFamily:"monospace",color:T.textMuted}}>{pace?`${fmt.pace(pace)}/km`:""}</div>
        <div style={{fontSize:11,color:T.textMuted}}>{act.average_heartrate?fmt.hr(Math.round(act.average_heartrate)):""}</div>
      </div>
    </div>
  );
}

function WeeklyBars({activities}){
  const weeks={};
  activities.forEach(a=>{
    const d=new Date(a.start_date_local),monday=new Date(d);
    monday.setDate(d.getDate()-((d.getDay()+6)%7));
    const key=monday.toISOString().split("T")[0];
    weeks[key]=(weeks[key]||0)+(a.distance||0);
  });
  const entries=Object.entries(weeks).sort().slice(-8);
  const maxDist=Math.max(...entries.map(e=>e[1]),1);
  return(
    <div>
      <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:1.5,fontFamily:"monospace",marginBottom:12}}>Wekelijks volume</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:52}}>
        {entries.map(([week,dist],i)=>(
          <div key={week} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <div title={`${(dist/1000).toFixed(1)} km`} style={{width:"100%",borderRadius:3,height:`${(dist/maxDist)*40}px`,background:i===entries.length-1?T.accent:T.surfaceAlt,minHeight:2,transition:"height 0.6s ease"}}/>
            <span style={{fontSize:9,color:T.textFaint,fontFamily:"monospace"}}>{new Date(week).toLocaleDateString("nl-NL",{day:"numeric",month:"numeric"})}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CoachingCard({coaching}){
  const typeColors={warning:T.yellow,tip:"#60A5FA",praise:T.green,goal:T.accent};
  const statusColors={fit:T.green,recovering:T.yellow,building:"#60A5FA",peaking:T.accent,overtrained:"#EF4444"};
  const intensityDots={easy:1,moderate:2,hard:3};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}} className="fadein">
      <div style={{background:T.accentMuted,border:`1px solid ${T.accent}44`,borderRadius:12,padding:"18px 20px"}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,color:statusColors[coaching.status]||T.accent,textTransform:"uppercase",fontFamily:"monospace",marginBottom:8}}>● {coaching.status}</div>
        <div style={{fontSize:18,fontWeight:700,color:T.text,lineHeight:1.3}}>{coaching.headline}</div>
        <div style={{fontSize:13,color:T.textMuted,marginTop:8}}>{coaching.weeklyFocus}</div>
      </div>
      {coaching.nextWorkout&&(
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"16px 20px"}}>
          <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:1.5,fontFamily:"monospace",marginBottom:8}}>Volgende training</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:T.text}}>{coaching.nextWorkout.type}</div>
              <div style={{fontSize:12,color:T.textMuted,marginTop:4}}>{coaching.nextWorkout.description}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,fontFamily:"monospace",color:T.accent}}>{coaching.nextWorkout.duration}</div>
              <div style={{display:"flex",gap:3,marginTop:4,justifyContent:"flex-end"}}>
                {[1,2,3].map(i=><div key={i} style={{width:6,height:6,borderRadius:99,background:i<=(intensityDots[coaching.nextWorkout.intensity]||1)?T.accent:T.border}}/>)}
              </div>
            </div>
          </div>
        </div>
      )}
      {coaching.insights?.map((ins,i)=>(
        <div key={i} style={{background:T.surface,border:`1px solid ${typeColors[ins.type]||T.border}44`,borderLeft:`3px solid ${typeColors[ins.type]||T.border}`,borderRadius:8,padding:"12px 16px"}}>
          <div style={{fontSize:12,fontWeight:700,color:typeColors[ins.type]||T.textMuted,marginBottom:4}}>{ins.title}</div>
          <div style={{fontSize:13,color:T.textMuted,lineHeight:1.5}}>{ins.body}</div>
        </div>
      ))}
    </div>
  );
}

// ── API Key screen ──
function ApiKeyScreen({onSave}){
  const [key,setKey]=useState("");
  return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:36,maxWidth:420,width:"100%"}}>
        <div style={{fontSize:13,fontWeight:800,letterSpacing:2,color:T.accent,textTransform:"uppercase",fontFamily:"monospace",marginBottom:16}}>⚡ Trainingsdashboard</div>
        <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:8}}>Anthropic API key invoeren</div>
        <div style={{fontSize:13,color:T.textMuted,marginBottom:20,lineHeight:1.6}}>
          Vul je Anthropic API key in om Strava data op te halen. De key wordt lokaal opgeslagen in je browser.
          <br/><br/>
          <a href="https://console.anthropic.com/keys" target="_blank" style={{color:T.accent}}>Haal je key op via console.anthropic.com →</a>
        </div>
        <input
          type="password"
          placeholder="sk-ant-..."
          value={key}
          onChange={e=>setKey(e.target.value)}
          style={{width:"100%",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 14px",color:T.text,fontSize:13,fontFamily:"monospace",marginBottom:12,outline:"none"}}
        />
        <button
          onClick={()=>{if(key.startsWith("sk-ant-")){localStorage.setItem(API_KEY_STORAGE,key);onSave(key);}else{alert("Ongeldige API key — moet beginnen met sk-ant-");}}}
          style={{width:"100%",background:T.accent,border:"none",borderRadius:8,padding:"11px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}
        >Dashboard openen</button>
      </div>
    </div>
  );
}

// ── Main Dashboard ──
function Dashboard({apiKey,onLogout}){
  const [profile,setProfile]=useState(null);
  const [activities,setActivities]=useState([]);
  const [zones,setZones]=useState(null);
  const [coaching,setCoaching]=useState(null);
  const [loadingData,setLoadingData]=useState(true);
  const [loadingCoaching,setLoadingCoaching]=useState(false);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState("overview");

  const loadData=useCallback(async()=>{
    setLoadingData(true);setError(null);setCoaching(null);
    try{
      const [prof,acts,z]=await Promise.all([
        callStravaMCP("get_athlete_profile",{},apiKey),
        callStravaMCP("list_activities",{per_page:20},apiKey),
        callStravaMCP("get_athlete_zones",{},apiKey),
      ]);
      setProfile(prof);
      const actList=Array.isArray(acts)?acts:acts?.activities||[];
      setActivities(actList);
      setZones(z);
      if(actList.length>0){
        setLoadingCoaching(true);
        const c=await getAICoaching(actList,prof,z,apiKey);
        setCoaching(c);setLoadingCoaching(false);
      }
    }catch(e){setError(e.message);}
    finally{setLoadingData(false);}
  },[apiKey]);

  useEffect(()=>{loadData();},[loadData]);

  const last30=activities.filter(a=>(Date.now()-new Date(a.start_date_local))<30*86400000);
  const totalDist=last30.reduce((s,a)=>s+(a.distance||0),0);
  const totalTime=last30.reduce((s,a)=>s+(a.moving_time||0),0);
  const avgHR=last30.filter(a=>a.average_heartrate).reduce((s,a,_,arr)=>s+a.average_heartrate/arr.length,0);

  const sectionStyle={background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"20px 24px",marginBottom:14};
  const sectionTitle={fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:1.5,fontFamily:"monospace",marginBottom:14};
  const spinnerStyle={display:"inline-block",width:16,height:16,border:`2px solid ${T.border}`,borderTopColor:T.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite"};

  return(
    <div style={{background:T.bg,minHeight:"100vh",paddingBottom:40}}>
      {/* Header */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontSize:12,fontWeight:800,letterSpacing:2,color:T.accent,textTransform:"uppercase",fontFamily:"monospace"}}>⚡ Trainingsdashboard</div>
          {profile&&<div style={{fontSize:11,color:T.textMuted,marginTop:2}}>{profile.firstname} {profile.lastname}{profile.city?` · ${profile.city}`:""}</div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={loadData} style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,color:T.textMuted,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>↻</button>
          <button onClick={onLogout} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.textMuted,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>Uitloggen</button>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 14px"}}>
        {error&&<div style={{background:"#EF444422",border:"1px solid #EF444444",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#FCA5A5"}}>⚠ {error}</div>}

        {loadingData?(
          <div style={{textAlign:"center",padding:"80px 0",color:T.textMuted}}>
            <div style={spinnerStyle}/>
            <div style={{marginTop:12,fontSize:13}}>Strava data ophalen…</div>
          </div>
        ):(
          <>
            {/* Tabs */}
            <div style={{display:"flex",gap:4,marginBottom:20}}>
              {["overview","activiteiten","coaching"].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:"none",background:tab===t?T.accent:"transparent",color:tab===t?"#fff":T.textMuted,transition:"all 0.2s"}}>
                  {t.charAt(0).toUpperCase()+t.slice(1)}
                  {t==="coaching"&&loadingCoaching&&<span style={{marginLeft:6,display:"inline-block",width:8,height:8,border:`1.5px solid #fff`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
                </button>
              ))}
            </div>

            {/* OVERVIEW */}
            {tab==="overview"&&(
              <div className="fadein">
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
                  <StatCard label="Afstand (30d)" value={`${(totalDist/1000).toFixed(0)} km`} icon="📍" ring={{value:totalDist/1000,max:150,color:T.accent,size:50,stroke:5}}/>
                  <StatCard label="Trainingstijd (30d)" value={fmt.dur(totalTime)} icon="⏱" ring={{value:totalTime/3600,max:15,color:"#60A5FA",size:50,stroke:5}}/>
                  <StatCard label="Gem. hartslag" value={avgHR?`${Math.round(avgHR)} bpm`:"–"} icon="❤" ring={{value:avgHR||0,max:200,color:T.green,size:50,stroke:5}}/>
                  <StatCard label="Activiteiten (30d)" value={last30.length} icon="🏅" ring={{value:last30.length,max:20,color:T.yellow,size:50,stroke:5}}/>
                </div>
                <div style={sectionStyle}>
                  <WeeklyBars activities={activities}/>
                </div>
                <div style={sectionStyle}>
                  <div style={sectionTitle}>Recente activiteiten</div>
                  {activities.slice(0,5).map(a=><ActivityRow key={a.id} act={a}/>)}
                </div>
              </div>
            )}

            {/* ACTIVITEITEN */}
            {tab==="activiteiten"&&(
              <div style={sectionStyle} className="fadein">
                <div style={sectionTitle}>Alle activiteiten ({activities.length})</div>
                {activities.map(a=><ActivityRow key={a.id} act={a}/>)}
              </div>
            )}

            {/* COACHING */}
            {tab==="coaching"&&(
              loadingCoaching?(
                <div style={{textAlign:"center",padding:"60px 0",color:T.textMuted}}>
                  <div style={spinnerStyle}/>
                  <div style={{marginTop:12,fontSize:13}}>AI coach analyseert jouw data…</div>
                </div>
              ):coaching?<CoachingCard coaching={coaching}/>:(
                <div style={{...sectionStyle,textAlign:"center",color:T.textMuted}}>
                  <div style={{fontSize:32,marginBottom:12}}>🏋️</div>
                  <div>Geen coachingdata. Zorg dat er recente activiteiten zijn.</div>
                </div>
              )
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── App root ──
function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(API_KEY_STORAGE)||"");
  if(!apiKey) return <ApiKeyScreen onSave={setApiKey}/>;
  return <Dashboard apiKey={apiKey} onLogout={()=>{localStorage.removeItem(API_KEY_STORAGE);setApiKey("");}} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
